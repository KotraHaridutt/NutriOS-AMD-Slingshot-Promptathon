# ═══════════════════════════════════════════════
# NutriOS — Cloud Build CI/CD Pipeline
# ═══════════════════════════════════════════════
# Triggered on push to main branch.
# Builds Docker image, pushes to Artifact Registry,
# and deploys to Cloud Run.

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrios:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrios:latest'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nutrios:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nutrios:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutrios'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutrios:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'ENVIRONMENT=production'

images:
  - 'gcr.io/$PROJECT_ID/nutrios:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nutrios:latest'

options:
  logging: CLOUD_LOGGING_ONLY
